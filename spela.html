<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spela Runda</title>
    <link href="style-spela.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="display">
        <header>
            <h1 id="course-title">Banans namn</h1>
        </header>

        <div class="korg-nav">
            <button id="prev-hole-btn" class="nav-pil">◀</button>
            <div class="korg-info">
                <h2 id="hole-number">Korg 1 / 18</h2>
                <p id="hole-par">Par 3</p>
            </div>
            <button id="next-hole-btn" class="nav-pil">▶</button>
        </div>

        <div id="players-list" class="players-list">
            </div>

        <div class="knappar">
            <button class="avsluta-btn" id="end-round-btn">Avsluta runda</button>
        </div>
    </div>
</body>
</html>
